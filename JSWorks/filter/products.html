<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watches</title>
    <link rel="stylesheet" href="products.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

</head>
<body>
    <header>
        <a href="cart.html"><i class='bx bx-cart'></i>Cart</a>
    </header>

    <!-- Filter Form -->
    <form action="" class="m-1">
        <input type="number" id="min" placeholder="Enter minimum value">
        <input type="number" id="max" placeholder="Enter maximum value">
        <input type="button" value="Filter" onclick="filter()">
    </form>

    <!-- Carousel -->

      <div id="carouselExampleDark" class="carousel carousel-dark slide">
        <div class="carousel-indicators">
          <button type="button" data-bs-target="#carouselExampleDark" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
          <button type="button" data-bs-target="#carouselExampleDark" data-bs-slide-to="1" aria-label="Slide 2"></button>
          <button type="button" data-bs-target="#carouselExampleDark" data-bs-slide-to="2" aria-label="Slide 3"></button>
        </div>
        <div class="carousel-inner">
          <div class="carousel-item bg0 active" data-bs-interval="10000">
            
            <div class="carousel-caption d-none d-md-block">
              
              <p class="lead">Your Wrist deserves the best.</p>
            </div>
          </div>
          <div class="carousel-item bg1" data-bs-interval="2000">
            
            <div class="carousel-caption d-none d-md-block">
              
              <p class="lead">Crafted to perfection, designed for you.</p>
            </div>
          </div>
          <div class="carousel-item bg2">
            
            <div class="carousel-caption d-none d-md-block">
              
              <p class="lead">Every second tells a story.</p>
            </div>
          </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleDark" data-bs-slide="prev">
          <span class="carousel-control-prev-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleDark" data-bs-slide="next">
          <span class="carousel-control-next-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Next</span>
        </button>
      </div>

    <div class="container-fluid mt-4">
        <div class="row" id="products-container"></div>
    </div>
    <script src="products.js"></script>
</body>
</html>
